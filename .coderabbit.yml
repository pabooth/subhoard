# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# https://docs.coderabbit.ai/reference/configuration

language: en-GB
focus: balanced
tone_instructions: >
  Be direct and concise. Prioritise correctness, security, privacy, and
  missing tests over style-only comments. Avoid restating what the code does
  unless it explains a concrete risk.
early_access: false

reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_instructions: |
    Summarise the change in 2–3 sentences, then list:
    - affected areas (CLI, Substack fetching, cache, digest/PDF export, email, packaging, tests, or CI)
    - tests added or updated
    Explicitly call out changes affecting cookie/session data, subscriber
    content, URL validation, HTML sanitisation, filesystem permissions, or
    SMTP security.
  auto_title_instructions: >
    Format: "<type>(<scope>): <title>".
    Type must be one of: feat, fix, docs, refactor, test, chore, ci.
    Scope should be one of: cli, fetch, cache, export, email, security,
    packaging, tests, ci, docs.
    Title should be concise (≤ 72 chars).
    Example: "fix(cache): preserve private permissions on atomic writes"
  poem: false
  in_progress_fortune: false
  sequence_diagrams: false
  review_status: true
  review_details: true
  changed_files_summary: true
  estimate_code_review_effort: true
  collapse_walkthrough: false
  suggested_labels: true
  labeling_instructions:
    - label: security
      instructions: >
        Apply when the PR changes cookie/session handling, subscriber-content
        access, URL validation, HTML sanitisation, SMTP authentication or TLS,
        filesystem permissions, or sensitive logging.
    - label: tests
      instructions: Apply when the PR primarily adds or restructures automated tests.
    - label: ci
      instructions: Apply when the PR changes GitHub Actions or Dependabot configuration.
    - label: docs
      instructions: >
        Apply when the PR is primarily documentation, such as README.md,
        SECURITY.md, or CONTRIBUTING.md.
    - label: dependencies
      instructions: Apply when the PR changes runtime or development dependencies.

  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - "WIP"
      - "[skip review]"
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!.venv/**"
    - "!venv/**"
    - "!dist/**"
    - "!build/**"
    - "!**/__pycache__/**"
    - "!**/*.pyc"
    - "!.pytest_cache/**"
    - "!.ruff_cache/**"
    - "!.mypy_cache/**"
    - "!*.egg-info/**"
    - "!post_cache/**"
    - "!digest_export/**"
    - "!pdf_export/**"
    - "!header.png"

  path_instructions:
    - path: "subhoard.py"
      instructions: |
        This is the complete application and handles untrusted remote content
        plus sensitive local data. Check:
        - Subscriber content is fetched only when explicitly requested and a
          user-supplied session is available; public-only mode must not expose
          or accidentally archive paid content.
        - Browser navigation and API requests remain restricted to absolute
          HTTPS URLs on the configured publication host. Reject credentials,
          unexpected ports, unsafe schemes, and attacker-controlled redirects.
        - Cookie values, SMTP passwords, subscriber content, and session data
          are never logged, embedded in exceptions, or written to unintended
          locations.
        - Cookie, cache, digest, PDF, and log paths cannot enable traversal or
          overwrite unrelated files through remote post metadata.
        - Sensitive directories and files retain owner-only permissions on
          POSIX systems. Cache updates remain atomic and recover safely from
          malformed or legacy cache files.
        - Remote HTML is treated as untrusted. Active elements, event-handler
          attributes, and dangerous URL schemes must be removed before
          caching, exporting, or emailing. Dynamic email fields and headers
          must be escaped or cleaned against HTML and header injection.
        - SMTP credentials and message content are sent only over the selected
          secure transport. Reconnect and retry behaviour must not duplicate
          successful deliveries or mark failed deliveries as complete.
        - Dry-run mode has no output, cache, email, or other persistent side
          effects.
        - Behaviour changes include focused unittest coverage for success,
          malformed-input, and failure paths without real network access,
          credentials, browser sessions, or email delivery.

    - path: "tests/**"
      instructions: |
        Check that tests assert externally observable behaviour and meaningful
        failure cases. Reject real cookies, credentials, subscriber content, or
        personal data in fixtures. Tests must not use live Substack pages, SMTP
        servers, browser downloads, timing assumptions, or the user's real
        filesystem. Security-sensitive changes should cover URL restrictions,
        sanitisation, header injection, permissions, and failure handling.

    - path: "pyproject.toml"
      instructions: |
        Check package metadata, Python 3.9 compatibility, console-script
        behaviour, dependency compatibility, and consistency with README.md,
        requirements.txt, VERSION, and CI. Flag unnecessarily broad dependency
        additions or changes that make installation less reproducible.

    - path: "{README.md,CONTRIBUTING.md,SECURITY.md}"
      instructions: |
        Check that commands, options, environment variables, generated paths,
        security guidance, and supported Python versions match the code.
        Preserve the authorization boundary: users may archive only content
        they are permitted to access and retain. Use clear British English.

    - path: ".github/workflows/**"
      instructions: |
        Check for least-privilege permissions, secret leakage, supported Python
        versions, bounded execution time, and consistency with local test
        commands. Third-party actions should be pinned to immutable commit SHAs.

    - path: ".github/dependabot.yml"
      instructions: |
        Check ecosystem names, directories, schedules, and update limits.
        Ensure dependency automation covers both Python and GitHub Actions
        without creating excessive update noise.

    - path: "**/*.env*"
      instructions: |
        Flag any real cookies, tokens, passwords, email addresses, publication
        data, or subscriber content. Environment examples must use obvious
        placeholders only.

chat:
  auto_reply: true
  art: false

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
  learnings:
    scope: local
  issues:
    scope: auto
  pull_requests:
    scope: auto
