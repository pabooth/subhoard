name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include cookies, SMTP credentials, or subscriber content.
  - type: input
    id: version
    attributes:
      label: Subhoard version
      placeholder: Output of `subhoard --version`
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version and operating system
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
