name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade build pip

      - name: Build distributions
        run: |
          python -m build
          test -n "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"

      - name: Install built wheel
        run: python -m pip install dist/*.whl

      - name: Smoke-test installed application
        run: |
          subhoard --version
          subhoard --help

      - name: Install test tools
        run: python -m pip install ".[dev]"

      - name: Lint
        run: ruff check subhoard.py tests

      - name: Run regression tests
        run: python -m unittest discover -s tests -v

      - name: Compile source
        run: python -m py_compile subhoard.py tests/test_subhoard.py
