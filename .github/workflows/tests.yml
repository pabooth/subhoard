name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify package installation
        run: |
          python -m pip install --no-deps .
          subhoard --version
          subhoard --help

      - name: Install test tools
        run: python -m pip install beautifulsoup4 ruff==0.15.18

      - name: Lint
        run: ruff check subhoard.py tests

      - name: Run regression tests
        run: python -m unittest discover -s tests -v

      - name: Compile source
        run: python -m py_compile subhoard.py tests/test_subhoard.py
