name: CodeRabbit Reviewed

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: read

jobs:
  coderabbit-reviewed:
    runs-on: ubuntu-latest
    steps:
      - name: Check for CodeRabbit review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          REVIEWS=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" --jq '[.[] | select(.user.login == "coderabbitai[bot]")]')

          COUNT=$(echo "$REVIEWS" | jq 'length')

          if [ "$COUNT" -eq 0 ]; then
            echo "No CodeRabbit review found on this PR (CodeRabbit may have hit a rate limit or skipped this PR)."
            echo "This check requires a genuine CodeRabbit review before merge."
            exit 1
          fi

          echo "Found $COUNT CodeRabbit review(s). Check passed."
